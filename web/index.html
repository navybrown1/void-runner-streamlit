<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main id="app" class="app" tabindex="0" aria-label="Snake game">
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">Classic arcade</p>
        <h1>Snake</h1>
      </div>

      <div class="stats" aria-label="Game stats">
        <div class="stat">
          <span class="label">Score</span>
          <span id="scoreDisplay" class="value">0</span>
        </div>
        <div class="stat">
          <span class="label">Length</span>
          <span id="lengthDisplay" class="value">3</span>
        </div>
        <div class="stat">
          <span class="label">Status</span>
          <span id="statusDisplay" class="value">Running</span>
        </div>
      </div>
    </header>

    <section class="board-shell" aria-label="Game board">
      <div id="board" class="board" role="grid" aria-label="Snake playfield"></div>

      <div id="overlay" class="overlay hidden" aria-live="polite">
        <div class="overlay-card">
          <p class="overlay-kicker">Game over</p>
          <h2 id="overlayTitle">Snake crashed</h2>
          <p id="overlayCopy">Press Enter or tap Restart to play again.</p>
          <button id="overlayRestart" class="restart-button" type="button">Restart</button>
        </div>
      </div>
    </section>

    <footer class="footer">
      <p class="help-text">Use arrow keys or WASD. The snake stops when it hits a wall or itself.</p>

      <div class="controls">
        <div class="touch-controls" aria-label="Touch controls">
          <button class="touch-spacer" type="button" tabindex="-1" aria-hidden="true" disabled></button>
          <button class="touch-btn" type="button" data-dir="up" aria-label="Move up">Up</button>
          <button class="touch-spacer" type="button" tabindex="-1" aria-hidden="true" disabled></button>
          <button class="touch-btn" type="button" data-dir="left" aria-label="Move left">Left</button>
          <button class="touch-btn" type="button" data-dir="down" aria-label="Move down">Down</button>
          <button class="touch-btn" type="button" data-dir="right" aria-label="Move right">Right</button>
          <button class="touch-spacer" type="button" tabindex="-1" aria-hidden="true" disabled></button>
          <button class="touch-spacer" type="button" tabindex="-1" aria-hidden="true" disabled></button>
          <button class="touch-spacer" type="button" tabindex="-1" aria-hidden="true" disabled></button>
        </div>

        <button id="footerRestart" class="restart-inline" type="button">Restart</button>
      </div>
    </footer>
  </main>

  <script src="/game.js"></script>
</body>
</html>
